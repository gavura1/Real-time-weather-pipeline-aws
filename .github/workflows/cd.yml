name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Build and deploy to AWS ECS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      AWS_REGION: eu-central-1
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      BACKEND_IMAGE: weather-backend
      WORKER_IMAGE: weather-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:latest ./backend
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }} ./backend
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }}

      - name: Build and push worker image
        run: |
          docker build -t $ECR_REGISTRY/$WORKER_IMAGE:latest ./worker
          docker build -t $ECR_REGISTRY/$WORKER_IMAGE:${{ github.sha }} ./worker
          docker push $ECR_REGISTRY/$WORKER_IMAGE:latest
          docker push $ECR_REGISTRY/$WORKER_IMAGE:${{ github.sha }}

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_BACKEND }} \
            --force-new-deployment

      - name: Deploy worker to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_WORKER }} \
            --force-new-deployment

      - name: Wait for backend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_BACKEND }}

      - name: Wait for worker deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_WORKER }}

      - name: Smoke test
        run: |
          chmod +x scripts/smoke_test.sh
          bash scripts/smoke_test.sh ${{ secrets.APP_URL }}